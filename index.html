<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700&display=swap" rel="stylesheet">

    <title>Frontend Mentor | Todo app</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/localStorage/2.0.1/localStorage.min.js"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  
  <body>
    <div class="bg">
      <div class="bg-img dark-bg"></div>
      <div class="bg-color dark-color"></div>
    </div>

    <main>
      <header>
        <h1 class="title">TODO</h1>
        <span class="toggle-theme toggle-light"></span>
      </header>

      <section class="todo-list">
        <div class="create-new">
          <label class="checkbox-container">
            <input type="checkbox" />
            <span class="checkmark"></span>
          </label>
          <input
            type="text"
            name="new-todo"
            class="new-todo-text"
            placeholder="Create a new todo..."
          />
        </div>

        <div class="todo-items">
          <ul>
            <!--  <li style="display: none">
              <label class="checkbox-container todo-item">
                <input type="checkbox todo-check" />
                <span class="checkmark"></span>
              </label>
              <p class="todo-title"></p>
              
            </li> -->
          </ul>

          <div class="todo-footer">
            <div class="items-left"></div>
            <div class="clear-completed">Clear Completed</div>
          </div>
        </div>

        <div class="tabs-container">
          <div class="tabs all-items active">All</div>
          <div class="tabs active-items">Active</div>
          <div class="tabs completed-items">Completed</div>
        </div>
      </section>
    </main>

    <footer class="attribution">
      <p>
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by <a href="#">Saki</a>.
      </p>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
